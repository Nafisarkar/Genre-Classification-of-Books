<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Text Classification</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script
      type="text/javascript"
      src="{{ url_for('static', filename='script.js') }}"
    ></script>
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:400,700&amp;subset=cyrillic"
      rel="stylesheet"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #2a0944;
        color: #fec260;
        height: 100vh;
        margin: 0;
        padding: 20px;
        font-family: "Poppins", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      nav {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(30px);
        border-radius: 20px;
        margin: 3%;
        width: 70%;
        height: 10%;
        box-shadow: 0 4px 8px #3b185f;
      }
      .container {
        background: #3b185f;
        backdrop-filter: blur(30px);
        border-radius: 20px;
        padding: 4%;
        margin: 3%;
        width: 70%;
        box-shadow: 0 4px 8px #3b185f;
      }
      nav ul {
        list-style-type: none;
        padding: 0;
        margin: 0;
        display: flex;
        font-family: "Poppins", sans-serif;
        font-weight: bold;
        color: #a12568;
        font-size: 1.2rem;
        gap: 2vh;
      }

      nav ul li a {
        text-decoration: none;
        color: #a12568;
      }
      nav ul li a:hover {
        animation: hover 0.5s ease-in-out;
      }
      @keyframes hover {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
      h1 {
        margin-bottom: 20px;
        text-shadow: 0 0 10px #fec160bb, 0 0 20px #fec16070, 0 0 30px #fec1602d;
      }
      textarea {
        border: none;
        background-color: transparent;
        resize: none;
        outline: none;
        width: 100%;
        height: 150px;
        padding: 10px;
        margin-bottom: 30px;
        border: none;
        border-radius: 5px;
        background-color: rgba(255, 255, 255, 0.1);
        color: #fec260;
        box-shadow: 0 4px 8px #3b185f;
      }
      button {
        font-family: "Poppins", sans-serif;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-weight: bold;
        font-size: 1.2em;
        background-color: #a12568;
        color: #fec260;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      button:hover {
        background-color: #fcb035;
        color: #a12568;
      }
      #prediction {
        font-family: "Poppins", sans-serif;
        text-align: center;
        font-weight: bold;
        color: #fcb035;
        font-size: 1.5em;
        margin-top: 20px;
      }

      #model-select {
        text-decoration: none;
        color: inherit;
        background-color: #310c55;
        border: none;
        border-radius: 5px;
        padding: 10px;
        font-size: 1.2em;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="navbar-bg"></div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <div class="container">
      <h1>Text Classification - DatasetV8</h1>
      <form
        action="/upload"
        method="post"
        enctype="multipart/form-data"
        class="upload-form"
      >
        <label for="file" class="upload-label" style="width: 100%">
          <input
            type="file"
            name="file"
            accept=".pdf"
            id="file"
            class="upload-input"
          />
          <div class="upload-button">
            <i class="fas fa-upload"></i>
            <span>Upload PDF</span>
          </div>
        </label>
      </form>
      <style>
        .upload-form {
          display: flex;
          justify-content: center;
          align-items: center;
          margin-top: 10px;
        }

        .upload-label {
          display: flex;
          align-items: center;
          cursor: pointer;
          background-color: #a12568;
          border-radius: 5px;
          padding-top: 5px;
          padding-bottom: 5px;
          margin-bottom: 20px;
          transition: background-color 0.3s;
          width: 100%;
        }

        .upload-label:hover {
          background-color: #fcb035;
        color: #a12568;
        }

        .upload-input {
          display: none;
        }

        .upload-button {
          display: flex;
          align-items: center;
          font-size: 1.2em;
          font-weight: bold;
        }

        .upload-button i {
          margin-right: 10px;
        }
      </style>

      <select
        id="model-select"
        style="width: 100%; padding: 10px; font-size: 1em; margin-bottom: 20px"
      >
        <option value="random_forest">Random Forest</option>
        <option value="gbm">GBM</option>
        <option value="svm">Support Vector Machine</option>
      </select>
      <form>
        <textarea id="text" placeholder="Enter text here"></textarea>
        <button type="button" onclick="predict()">Predict</button>
      </form>
      <div id="prediction"></div>
    </div>
    <div
      style="
        position: fixed;
        bottom: 0;
        width: 100%;
        text-align: center;
        color: #e6bf13da;
        background-color: #2a094400;
        padding: 3vh;
      "
    >
      <p style="white-space: nowrap">Created by Thesis Group</p>
      <p style="white-space: nowrap">Nafi Sarkar &amp; Peya Pandit</p>
    </div>
  </body>
</html>
